<svg width="100%" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120a18"/>
      <stop offset="50%" stop-color="#0d0d16"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0f" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00f0ff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ff2ec4" stop-opacity="0.9"/>
      <stop offset="85%" stop-color="#00f0ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlowF" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @keyframes twinkleF {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }
      @keyframes shimmer {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .starF { animation: twinkleF 2.6s ease-in-out infinite; }
      .lineGlow { animation: shimmer 4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1200" height="120" fill="url(#bgGradF)"/>

  <!-- decorative scattered sparkles -->
  <g fill="#ffffff">
    <circle class="starF" cx="90" cy="30" r="1.4" style="animation-delay:0s"/>
    <circle class="starF" cx="220" cy="80" r="1.1" style="animation-delay:0.5s"/>
    <circle class="starF" cx="340" cy="25" r="1.6" style="animation-delay:1s"/>
    <circle class="starF" cx="860" cy="28" r="1.5" style="animation-delay:0.7s"/>
    <circle class="starF" cx="980" cy="75" r="1.2" style="animation-delay:1.3s"/>
    <circle class="starF" cx="1110" cy="35" r="1.4" style="animation-delay:0.2s"/>
  </g>

  <!-- glowing divider line -->
  <rect class="lineGlow" x="0" y="58" width="1200" height="2" fill="url(#lineGrad)" filter="url(#softGlowF)"/>

  <!-- small sparkle accents near center -->
  <g filter="url(#softGlowF)">
    <path d="M 560 45 l 4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z" fill="#ff6ad5"/>
    <path d="M 636 70 l 3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z" fill="#00f0ff"/>
  </g>

  <text x="600" y="100" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="14" fill="#8888a8" letter-spacing="1">
    ʚ♡ɞ thanks for stopping by ʚ♡ɞ
  </text>
</svg>
